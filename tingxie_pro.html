<!DOCTYPE html>
<html lang="zh-SG">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>新加坡小学高级华文听写练习 Pro</title>
<style>
:root {
  --primary: #1a73e8;
  --success: #34a853;
  --danger: #ea4335;
  --warn: #fbbc04;
  --bg: #f0f4ff;
  --card: #ffffff;
  --text: #202124;
  --sub: #5f6368;
  --border: #dadce0;
  --radius: 12px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans SC", Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* ── 顶栏 ── */
.topbar {
  background: var(--primary);
  color: #fff;
  padding: 14px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
  box-shadow: 0 2px 8px rgba(0,0,0,.2);
  flex-wrap: wrap;
}
.topbar h1 { font-size: 17px; flex: 1; }
.topbar .badge {
  background: rgba(255,255,255,.2);
  border-radius: 20px;
  padding: 3px 10px;
  font-size: 12px;
}

/* ── 标签页 ── */
.tabs {
  display: flex;
  background: #fff;
  border-bottom: 2px solid var(--border);
  overflow-x: auto;
}
.tab-btn {
  padding: 12px 20px;
  border: none;
  background: none;
  cursor: pointer;
  font-size: 14px;
  color: var(--sub);
  white-space: nowrap;
  border-bottom: 3px solid transparent;
  margin-bottom: -2px;
  transition: .2s;
}
.tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); font-weight: 600; }
.tab-btn:hover:not(.active) { background: #f8f9fa; }

/* ── 面板 ── */
.panel { display: none; padding: 20px; max-width: 800px; margin: 0 auto; }
.panel.active { display: block; }

/* ── 卡片 ── */
.card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 20px;
  box-shadow: 0 1px 4px rgba(0,0,0,.1);
  margin-bottom: 16px;
}
.card-title { font-size: 15px; font-weight: 700; margin-bottom: 12px; color: var(--primary); }

/* ── 按钮组 ── */
.btn-group { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
.btn {
  padding: 8px 16px;
  border-radius: 8px;
  border: 1.5px solid var(--border);
  background: #fff;
  cursor: pointer;
  font-size: 13px;
  color: var(--text);
  transition: .15s;
}
.btn:hover { background: #f0f4ff; border-color: var(--primary); }
.btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }
.btn.danger { background: var(--danger); color: #fff; border-color: var(--danger); }
.btn.success { background: var(--success); color: #fff; border-color: var(--success); }
.btn.large { font-size: 15px; padding: 12px 28px; border-radius: 10px; }
.btn:disabled { opacity: .4; cursor: not-allowed; }

/* ── 听写练习区 ── */
.practice-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
  flex-wrap: wrap;
  gap: 8px;
}
.progress-info { font-size: 13px; color: var(--sub); }
/* ── 进度条增强 ── */
.progress-bar-wrap {
  height: 8px;
  background: var(--border);
  border-radius: 4px;
  margin-bottom: 16px;
  overflow: hidden;
  box-shadow: inset 0 1px 3px rgba(0,0,0,.1);
}
.progress-bar {
  height: 100%;
  background: linear-gradient(90deg, var(--primary), #5b9cf6);
  border-radius: 4px;
  transition: width .35s cubic-bezier(.4,0,.2,1);
  position: relative;
  overflow: hidden;
}
.progress-bar::after {
  content: '';
  position: absolute;
  top: 0; left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,.35), transparent);
  animation: shimmer 1.5s infinite;
}
@keyframes shimmer {
  0% { left: -100%; }
  100% { left: 100%; }
}
.progress-bar.done { background: linear-gradient(90deg, var(--success), #5dd179); }
.progress-bar.done::after { display: none; }

/* ── 键盘快捷键提示 ── */
.kb-hints {
  display: flex;
  gap: 8px;
  justify-content: center;
  margin-top: 8px;
  flex-wrap: wrap;
}
.kb-chip {
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 4px;
  background: #f0f4ff;
  border: 1px solid #c5d8ff;
  color: var(--sub);
}
.kb-chip kbd {
  font-family: inherit;
  font-weight: 700;
  color: var(--primary);
}


.word-card {
  background: linear-gradient(135deg, #e8f0fe, #f0f4ff);
  border-radius: var(--radius);
  padding: 24px;
  text-align: center;
  margin-bottom: 16px;
  border: 1.5px solid #c5d8ff;
}
.pinyin-hint { font-size: 20px; color: var(--sub); letter-spacing: 2px; margin-bottom: 8px; min-height: 30px; }
.play-btn {
  width: 56px; height: 56px;
  border-radius: 50%;
  background: var(--primary);
  color: #fff;
  border: none;
  font-size: 24px;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 3px 10px rgba(26,115,232,.4);
  transition: .15s;
  margin: 0 8px;
}
.play-btn:hover { transform: scale(1.08); }
.play-btn.secondary { background: #5f6368; box-shadow: none; font-size: 18px; }

.answer-row {
  display: flex;
  gap: 10px;
  align-items: center;
  margin-bottom: 12px;
}
.answer-input {
  flex: 1;
  font-size: 20px;
  padding: 12px 16px;
  border: 2px solid var(--border);
  border-radius: 10px;
  outline: none;
  font-family: inherit;
  transition: .2s;
  text-align: center;
  letter-spacing: 2px;
}
.answer-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(26,115,232,.15); }
.answer-input.correct { border-color: var(--success); background: #e6f9ed; }
.answer-input.wrong { border-color: var(--danger); background: #fce8e6; }

.feedback-box {
  text-align: center;
  font-size: 16px;
  font-weight: 600;
  padding: 10px;
  border-radius: 8px;
  min-height: 42px;
  margin-bottom: 10px;
  transition: .2s;
}
.feedback-box.correct { background: #e6f9ed; color: var(--success); }
.feedback-box.wrong { background: #fce8e6; color: var(--danger); }
.feedback-box.hint { background: #fef7e0; color: #b36a00; }

.action-row { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }

/* ── 结果卡 ── */
.result-card {
  text-align: center;
  padding: 30px;
}
.score-circle {
  width: 110px;
  height: 110px;
  border-radius: 50%;
  display: inline-flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  margin-bottom: 16px;
  border: 5px solid;
}
.score-circle .score-num { font-size: 32px; }
.score-circle .score-total { font-size: 13px; opacity: .7; }
.rank-text { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
.rank-sub { font-size: 14px; color: var(--sub); margin-bottom: 20px; }

/* ── 词语列表 ── */
.word-list { list-style: none; }
.word-item {
  display: flex;
  align-items: center;
  padding: 10px 12px;
  border-radius: 8px;
  margin-bottom: 6px;
  background: #f8f9fa;
  gap: 12px;
  flex-wrap: wrap;
}
.word-item .hanzi { font-size: 18px; font-weight: 700; min-width: 60px; }
.word-item .py { font-size: 13px; color: var(--sub); flex: 1; }
.word-item .status-icon { font-size: 18px; }
.word-item.wrong-item { background: #fce8e6; }
.word-item.right-item { background: #e6f9ed; }

/* ── 错题本 ── */
.empty-state { text-align: center; padding: 40px; color: var(--sub); font-size: 15px; }
.wrong-list-item {
  display: flex;
  align-items: center;
  padding: 12px 14px;
  border-radius: 10px;
  margin-bottom: 8px;
  background: #fff5f5;
  border: 1px solid #fdd;
  gap: 12px;
  flex-wrap: wrap;
}
.wrong-list-item .hanzi { font-size: 20px; font-weight: 700; color: var(--danger); min-width: 60px; }
.wrong-list-item .info { flex: 1; }
.wrong-list-item .info .py { font-size: 13px; color: var(--sub); }
.wrong-list-item .info .cnt { font-size: 12px; color: var(--danger); margin-top: 2px; }
.wrong-list-item .del-btn {
  background: none; border: none; cursor: pointer; color: #ccc; font-size: 16px;
  padding: 4px 8px;
  border-radius: 4px;
}
.wrong-list-item .del-btn:hover { color: var(--danger); background: #fce8e6; }

/* ── 打印版 ── */
.print-controls { margin-bottom: 16px; }
.print-lesson-page {
  break-after: page;
  page-break-after: always;
  margin-bottom: 12px;
  padding-bottom: 10px;
  border-bottom: 1px dashed #ccc;
}
.print-lesson-page:last-child { border: none; }
.lesson-title-print {
  font-size: 13px;
  font-weight: bold;
  margin: 0 0 8px;
  padding: 4px 8px;
  background: #2c3e50;
  color: #fff;
  border-radius: 4px;
  display: inline-block;
  -webkit-print-color-adjust: exact;
  print-color-adjust: exact;
}
.student-info-print {
  display: flex;
  gap: 14px;
  margin-bottom: 8px;
  font-size: 12px;
  border-bottom: 1px solid #999;
  padding-bottom: 4px;
}
.print-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.print-table th, .print-table td {
  border: 1px solid #bdc3c7;
  padding: 5px 7px;
  text-align: left;
}
.print-table th { background: #f0f0f0; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
.print-wrapper { background: #fff; padding: 15mm 18mm; min-height: 297mm; }

/* ── 统计 ── */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 12px;
  margin-bottom: 16px;
}
.stat-card {
  background: #f8f9fa;
  border-radius: 10px;
  padding: 14px;
  text-align: center;
  border: 1px solid var(--border);
}
.stat-num { font-size: 28px; font-weight: 700; color: var(--primary); }
.stat-label { font-size: 12px; color: var(--sub); margin-top: 4px; }

/* ── 响应式 ── */
@media (max-width: 480px) {
  .panel { padding: 12px; }
  .topbar h1 { font-size: 14px; }
  .answer-input { font-size: 18px; }
}

/* ── 打印媒体 ── */
@media print {
  @page { size: A4; margin: 8mm 12mm; }
  body { background: white; }
  .topbar, .tabs, .panel:not(#print-panel), .print-controls { display: none !important; }
  #print-panel { display: block !important; padding: 0; max-width: 100%; }
  .print-wrapper { box-shadow: none; padding: 0; }
  .print-lesson-page { break-after: page; margin: 0; padding: 4mm 0; border: none; }
}

/* ── 动画 ── */
@keyframes pop { 0%{transform:scale(.85);opacity:0} 100%{transform:scale(1);opacity:1} }
.pop { animation: pop .2s ease; }

.lesson-selector {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 12px;
}
.lesson-selector select {
  flex: 1;
  padding: 8px 12px;
  border-radius: 8px;
  border: 1.5px solid var(--border);
  font-size: 14px;
  font-family: inherit;
  outline: none;
  cursor: pointer;
}
.lesson-selector select:focus { border-color: var(--primary); }

.mode-info {
  font-size: 12px;
  color: var(--sub);
  background: #f0f4ff;
  border-radius: 8px;
  padding: 8px 12px;
  margin-bottom: 12px;
  line-height: 1.6;
}

.tips-row {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-top: 10px;
}
.tip-chip {
  font-size: 12px;
  padding: 3px 10px;
  border-radius: 20px;
  background: #e8f0fe;
  color: var(--primary);
}
</style>
</head>
<body>

<div class="topbar">
  <h1>📝 新加坡小学高级华文听写练习 Pro</h1>
  <span class="badge">P3–P6</span>
  <span class="badge" id="wrong-badge" style="background:#ea4335;display:none">错题 0</span>
</div>

<div class="tabs">
  <button class="tab-btn active" onclick="showTab('practice')">🎯 听写练习</button>
  <button class="tab-btn" onclick="showTab('review')">📚 词语复习</button>
  <button class="tab-btn" onclick="showTab('wrong')">❌ 错题本</button>
  <button class="tab-btn" onclick="showTab('stats')">📊 学习统计</button>
  <button class="tab-btn" onclick="showTab('print')">🖨️ 打印版</button>
</div>

<!-- ══ 听写练习 ══ -->
<div class="panel active" id="practice-panel">
  <div class="card">
    <div class="card-title">选择年级和课文</div>
    <div class="btn-group" id="grade-btns">
      <button class="btn active" onclick="setGrade('p3')">小三</button>
      <button class="btn" onclick="setGrade('p4')">小四</button>
      <button class="btn" onclick="setGrade('p5')">小五</button>
      <button class="btn" onclick="setGrade('p6')">小六</button>
    </div>
    <div class="lesson-selector">
      <label style="font-size:13px;color:var(--sub);">选课：</label>
      <select id="lesson-select" onchange="setLesson(this.value)"></select>
      <button class="btn" onclick="startAllLesson()">全课练习</button>
    </div>
    <div class="mode-info">
      💡 点击 <strong>🔊 朗读</strong> 收听词语读音，然后在输入框中输入汉字，按回车或点击 <strong>✔ 确认</strong> 检查答案。
      <div class="tips-row">
        <span class="tip-chip">🔊 点击按钮朗读</span>
        <span class="tip-chip">⌨️ 输入汉字</span>
        <span class="tip-chip">↵ 回车确认</span>
        <span class="tip-chip">📌 错词自动记录</span>
        <span class="tip-chip">⌨️ 空格=重听 &nbsp; ESC=跳过</span>
      </div>
    </div>
    <div class="btn-group">
      <button class="btn success large" onclick="startPractice()">▶ 开始练习</button>
      <button class="btn danger" onclick="startWrongPractice()" id="wrong-practice-btn">复习错题</button>
    </div>
  </div>

  <!-- 练习主体 -->
  <div id="practice-area" style="display:none">
    <div class="card">
      <div class="practice-header">
        <span class="progress-info" id="prog-text">第 1 / 10 题</span>
        <span class="progress-info" id="score-text">✅ 0 &nbsp; ❌ 0</span>
      </div>
      <div class="progress-bar-wrap">
        <div class="progress-bar" id="prog-bar" style="width:0%"></div>
      </div>
      <div class="word-card">
        <div class="pinyin-hint" id="pinyin-display"></div>
        <div>
          <button class="play-btn" onclick="playWord()" title="朗读词语">🔊</button>
          <button class="play-btn secondary" onclick="playWordSlow()" title="慢速朗读">🐢</button>
        </div>
      </div>
      <div class="answer-row">
        <input type="text" class="answer-input" id="answer-input"
               placeholder="输入听到的汉字词语…"
               onkeydown="if(event.key==='Enter')checkAnswer()"
               autocomplete="off" autocorrect="off" autocapitalize="off">
      </div>
      <div class="feedback-box" id="feedback-box"></div>
      <div class="action-row">
        <button class="btn success large" onclick="checkAnswer()" id="confirm-btn">✔ 确认</button>
        <button class="btn large" onclick="skipWord()" id="skip-btn">跳过 →</button>
        <button class="btn" onclick="showHint()" id="hint-btn">💡 提示</button>
      </div>
      <div class="kb-hints">
        <span class="kb-chip"><kbd>Space</kbd> 重听</span>
        <span class="kb-chip"><kbd>Enter</kbd> 确认</span>
        <span class="kb-chip"><kbd>Esc</kbd> 跳过</span>
      </div>
    </div>
  </div>

  <!-- 结果 -->
  <div id="result-area" style="display:none">
    <div class="card result-card">
      <div class="score-circle" id="score-circle">
        <span class="score-num" id="final-score">0</span>
        <span class="score-total" id="final-total">/10</span>
      </div>
      <div class="rank-text" id="rank-text"></div>
      <div class="rank-sub" id="rank-sub"></div>
      <div class="btn-group" style="justify-content:center">
        <button class="btn success large" onclick="startPractice()">再练一次</button>
        <button class="btn danger large" onclick="startWrongPractice()" id="result-wrong-btn">专攻错题</button>
        <button class="btn large" onclick="showResultDetail()">查看详情</button>
      </div>
    </div>
    <div id="result-detail" style="display:none">
      <div class="card">
        <div class="card-title">本次答题详情</div>
        <ul class="word-list" id="result-word-list"></ul>
      </div>
    </div>
  </div>
</div>

<!-- ══ 词语复习 ══ -->
<div class="panel" id="review-panel">
  <div class="card">
    <div class="card-title">词语对照表</div>
    <div class="btn-group" id="review-grade-btns">
      <button class="btn active" onclick="setReviewGrade('p3')">小三</button>
      <button class="btn" onclick="setReviewGrade('p4')">小四</button>
      <button class="btn" onclick="setReviewGrade('p5')">小五</button>
      <button class="btn" onclick="setReviewGrade('p6')">小六</button>
    </div>
    <div class="lesson-selector">
      <label style="font-size:13px;color:var(--sub);">选课：</label>
      <select id="review-lesson-select" onchange="renderReview()"></select>
    </div>
  </div>
  <div id="review-content"></div>
</div>

<!-- ══ 错题本 ══ -->
<div class="panel" id="wrong-panel">
  <div class="card">
    <div class="card-title">我的错题本</div>
    <div class="btn-group">
      <button class="btn success" onclick="startWrongPractice()">🎯 专项练习</button>
      <button class="btn danger" onclick="clearAllWrong()">🗑️ 清空错题</button>
    </div>
  </div>
  <div id="wrong-list-content"></div>
</div>

<!-- ══ 统计 ══ -->
<div class="panel" id="stats-panel">
  <div class="card">
    <div class="card-title">📊 学习统计</div>
    <div class="stats-grid" id="stats-grid"></div>
    <div id="grade-stats-content"></div>
  </div>
  <div class="card">
    <div class="card-title">错误最多的词语（Top 10）</div>
    <ul class="word-list" id="top-wrong-list"></ul>
  </div>
</div>

<!-- ══ 打印版 ══ -->
<div class="panel" id="print-panel">
  <div class="print-controls card">
    <div class="card-title">打印设置</div>
    <div class="btn-group" id="print-grade-btns">
      <button class="btn active" onclick="setPrintGrade('p3')">小三</button>
      <button class="btn" onclick="setPrintGrade('p4')">小四</button>
      <button class="btn" onclick="setPrintGrade('p5')">小五</button>
      <button class="btn" onclick="setPrintGrade('p6')">小六</button>
    </div>
    <div class="btn-group">
      <button class="btn active" id="pv1-btn" onclick="setPrintVer('v1')">版本1：汉字+拼音</button>
      <button class="btn" id="pv2-btn" onclick="setPrintVer('v2')">版本2：默写自测</button>
    </div>
    <div style="margin-top:8px">
      <button class="btn success large" onclick="window.print()">🖨️ 打印 / 存PDF</button>
      <span style="font-size:12px;color:var(--sub);margin-left:10px">打印时勾选"背景图形"，纸张A4，边距默认</span>
    </div>
  </div>
  <div class="print-wrapper" id="print-wrapper"></div>
</div>

<script>
// ════════════════════════════════
// 词库数据（P3~P6，新加坡高级华文）
// ════════════════════════════════
const D = {

      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(i === 0 ? 880 : 1100, ctx.currentTime + t);
      gain.gain.setValueAtTime(0, ctx.currentTime + t);
      gain.gain.linearRampToValueAtTime(0.18, ctx.currentTime + t + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + t + 0.25);

// ════════════════════════════════
// localStorage 错题本 & 统计
// ════════════════════════════════
function loadWrong() {
  try { return JSON.parse(localStorage.getItem('hcl_wrong') || '{}'); } catch(e){ return {}; }
}
function saveWrong(obj) { localStorage.setItem('hcl_wrong', JSON.stringify(obj)); }
function addWrong(hanzi, pinyin) {
  const w = loadWrong();
  if (!w[hanzi]) w[hanzi] = { pinyin, count: 0, grade: cur.grade };
  w[hanzi].count++;
  saveWrong(w);
  updateWrongBadge();
}
function loadStats() {
  try { return JSON.parse(localStorage.getItem('hcl_stats') || '{"total":0,"correct":0,"sessions":0}'); } catch(e){ return {total:0,correct:0,sessions:0}; }
}
function saveStats(s) { localStorage.setItem('hcl_stats', JSON.stringify(s)); }
function updateWrongBadge() {
  const w = loadWrong();
  const cnt = Object.keys(w).length;
  const b = document.getElementById('wrong-badge');
  if (cnt > 0) { b.textContent = '错题 ' + cnt; b.style.display = ''; }
  else b.style.display = 'none';
  const btn = document.getElementById('wrong-practice-btn');
  const rbtn = document.getElementById('result-wrong-btn');
  if (btn) btn.disabled = (cnt === 0);
  if (rbtn) rbtn.disabled = (cnt === 0);
}

// ════════════════════════════════
// 标签切换
// ════════════════════════════════
function showTab(name) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(name + '-panel').classList.add('active');
  const tabs = ['practice','review','wrong','stats','print'];
  document.querySelectorAll('.tab-btn')[tabs.indexOf(name)].classList.add('active');
  if (name === 'wrong') renderWrongList();
  if (name === 'stats') renderStats();
  if (name === 'review') { buildReviewLessonSelect(); renderReview(); }
  if (name === 'print') renderPrint();
}

// ════════════════════════════════
// 年级/课文选择
// ════════════════════════════════
function setGrade(g) {
  cur.grade = g;
  document.querySelectorAll('#grade-btns .btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`#grade-btns .btn[onclick="setGrade('${g}')"]`).classList.add('active');
  buildLessonSelect();
}
function buildLessonSelect() {
  const sel = document.getElementById('lesson-select');
  sel.innerHTML = D[cur.grade].map((ls, i) => `<option value="${i}">${ls.t}</option>`).join('');
  cur.lessonIdx = 0;
}
function setLesson(idx) { cur.lessonIdx = parseInt(idx); }
function startAllLesson() { cur.lessonIdx = -1; startPractice(); }

// ════════════════════════════════
// 开始练习
// ════════════════════════════════
function startPractice() {
  cur.mode = 'lesson';
  let words;
  if (cur.lessonIdx === -1) {
    words = D[cur.grade].flatMap(ls => ls.w);
  } else {
    words = [...D[cur.grade][cur.lessonIdx].w];
  }
  // 随机打乱
  for (let i = words.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [words[i], words[j]] = [words[j], words[i]];
  }
  cur.words = words;
  cur.idx = 0; cur.correct = 0; cur.wrong = 0; cur.results = [];
  document.getElementById('practice-area').style.display = '';
  document.getElementById('result-area').style.display = 'none';
  updatePracticeUI();
}

function startWrongPractice() {
  showTab('practice');
  const w = loadWrong();
  const entries = Object.entries(w);
  if (entries.length === 0) { alert('错题本是空的，先做几道练习吧！'); return; }
  cur.mode = 'wrong';
  cur.words = entries.map(([h, v]) => [h, v.pinyin]);
  for (let i = cur.words.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [cur.words[i], cur.words[j]] = [cur.words[j], cur.words[i]];
  }
  cur.idx = 0; cur.correct = 0; cur.wrong = 0; cur.results = [];
  document.getElementById('practice-area').style.display = '';
  document.getElementById('result-area').style.display = 'none';
  updatePracticeUI();
}

// ════════════════════════════════
// 练习 UI
// ════════════════════════════════
function updatePracticeUI() {
  const total = cur.words.length;
  const n = cur.idx + 1;
  document.getElementById('prog-text').textContent = `第 ${n} / ${total} 题`;
  document.getElementById('score-text').innerHTML = `✅ ${cur.correct} &nbsp; ❌ ${cur.wrong}`;
  const bar = document.getElementById('prog-bar');
  bar.style.width = (cur.idx / total * 100) + '%';
  bar.classList.remove('done');
  document.getElementById('pinyin-display').textContent = cur.words[cur.idx][1];
  const inp = document.getElementById('answer-input');
  inp.value = '';
  inp.className = 'answer-input';
  inp.disabled = false;
  inp.focus();
  document.getElementById('feedback-box').textContent = '';
  document.getElementById('feedback-box').className = 'feedback-box';
  document.getElementById('confirm-btn').disabled = false;
  document.getElementById('skip-btn').disabled = false;
  document.getElementById('hint-btn').disabled = false;
}

function playWord() { speak(cur.words[cur.idx][0], 1); }
function playWordSlow() { speak(cur.words[cur.idx][0], 0.6); }

function speak(text, rate) {
  if (!window.speechSynthesis) { alert('您的浏览器不支持语音朗读，请换用 Chrome/Edge'); return; }
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'zh-CN';
  u.rate = rate || 1;
  u.pitch = 1;
  const voices = window.speechSynthesis.getVoices();
  const zhVoice = voices.find(v => v.lang.startsWith('zh') && v.name.includes('Google'))
                || voices.find(v => v.lang.startsWith('zh'));
  if (zhVoice) u.voice = zhVoice;
  window.speechSynthesis.speak(u);
}

function checkAnswer() {
  const inp = document.getElementById('answer-input');
  const userAns = inp.value.trim();
  if (!userAns) { playWord(); return; }
  const correct = cur.words[cur.idx][0];
  const isRight = (userAns === correct);
  const fb = document.getElementById('feedback-box');
  inp.disabled = true;
  document.getElementById('confirm-btn').disabled = true;
  document.getElementById('skip-btn').disabled = true;

  if (isRight) {
    inp.className = 'answer-input correct pop';
    fb.className = 'feedback-box correct pop';
    fb.textContent = '✅ 正确！' + correct;
    cur.correct++;
    playCorrect();
  } else {
    inp.className = 'answer-input wrong pop';
    fb.className = 'feedback-box wrong pop';
    fb.textContent = `❌ 正确答案：${correct}（${cur.words[cur.idx][1]}）`;
    cur.wrong++;
    addWrong(correct, cur.words[cur.idx][1]);
    playWrong();
    speak(correct, 1);
  }
  cur.results.push({ word: cur.words[cur.idx], userAns, isRight });
  setTimeout(() => nextWord(), isRight ? 1200 : 2200);
}

function showHint() {
  const word = cur.words[cur.idx][0];
  const hint = word.length <= 2 ? word[0] + (word.length > 1 ? '_'.repeat(word.length - 1) : '')
                                : word[0] + '_'.repeat(word.length - 2) + word[word.length - 1];
  const fb = document.getElementById('feedback-box');
  fb.className = 'feedback-box hint pop';
  fb.textContent = '💡 提示：' + hint + '（共' + word.length + '字）';
}

function skipWord() {
  const correct = cur.words[cur.idx][0];
  cur.wrong++;
  cur.results.push({ word: cur.words[cur.idx], userAns: '（跳过）', isRight: false });
  addWrong(correct, cur.words[cur.idx][1]);
  const fb = document.getElementById('feedback-box');
  fb.className = 'feedback-box wrong';
  fb.textContent = '跳过 → ' + correct;
  setTimeout(() => nextWord(), 1000);
}

function nextWord() {
  cur.idx++;
  if (cur.idx >= cur.words.length) {
    // 完成时进度条变绿
    document.getElementById('prog-bar').style.width = '100%';
    document.getElementById('prog-bar').classList.add('done');
    showResult();
  } else {
    updatePracticeUI();
  }
}

// ════════════════════════════════
// 结果
// ════════════════════════════════
function showResult() {
  document.getElementById('practice-area').style.display = 'none';
  document.getElementById('result-area').style.display = '';
  document.getElementById('result-detail').style.display = 'none';

  const total = cur.words.length;
  const pct = Math.round(cur.correct / total * 100);
  document.getElementById('final-score').textContent = cur.correct;
  document.getElementById('final-total').textContent = '/' + total;

  let circle = document.getElementById('score-circle');
  let rank, sub, color;
  if (pct >= 95) { rank='🏆 太棒了！'; sub='满分接近，继续保持！'; color='#34a853'; }
  else if (pct >= 80) { rank='🎉 很不错！'; sub='再多练习几次就满分了！'; color='#1a73e8'; }
  else if (pct >= 60) { rank='📖 继续加油！'; sub='还有一些词需要反复练习。'; color='#fbbc04'; }
  else { rank='💪 不要气馁！'; sub='错题本里已记录，专项复习一下吧！'; color='#ea4335'; }

  circle.style.borderColor = color;
  circle.style.color = color;
  document.getElementById('rank-text').textContent = rank;
  document.getElementById('rank-sub').textContent = sub;

  // 更新统计
  const s = loadStats();
  s.total += total; s.correct += cur.correct; s.sessions++;
  saveStats(s);

  updateWrongBadge();
}

function showResultDetail() {
  const box = document.getElementById('result-detail');
  const list = document.getElementById('result-word-list');
  box.style.display = '';
  list.innerHTML = cur.results.map(r =>
    `<li class="word-item ${r.isRight ? 'right-item' : 'wrong-item'}">
      <span class="hanzi">${r.word[0]}</span>
      <span class="py">${r.word[1]}</span>
      <span class="py">${r.isRight ? '' : '你答：' + r.userAns}</span>
      <span class="status-icon">${r.isRight ? '✅' : '❌'}</span>
    </li>`
  ).join('');
}

// ════════════════════════════════
// 词语复习
// ════════════════════════════════
function setReviewGrade(g) {
  reviewGrade = g;
  document.querySelectorAll('#review-grade-btns .btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`#review-grade-btns .btn[onclick="setReviewGrade('${g}')"]`).classList.add('active');
  buildReviewLessonSelect();
  renderReview();
}
function buildReviewLessonSelect() {
  const sel = document.getElementById('review-lesson-select');
  sel.innerHTML = D[reviewGrade].map((ls, i) => `<option value="${i}">${ls.t}</option>`).join('');
  reviewLessonIdx = 0;
}
function renderReview() {
  reviewLessonIdx = parseInt(document.getElementById('review-lesson-select').value) || 0;
  const ls = D[reviewGrade][reviewLessonIdx];
  const el = document.getElementById('review-content');
  el.innerHTML = `<div class="card">
    <div class="card-title">${ls.t}</div>
    <ul class="word-list">
    ${ls.w.map(w => `
      <li class="word-item">
        <span class="hanzi" style="cursor:pointer" onclick="speak('${w[0]}',1)" title="点击朗读">${w[0]} 🔊</span>
        <span class="py">${w[1]}</span>
      </li>`).join('')}
    </ul>
  </div>`;
}

// ════════════════════════════════
// 错题本
// ════════════════════════════════
function renderWrongList() {
  const w = loadWrong();
  const entries = Object.entries(w).sort((a,b) => b[1].count - a[1].count);
  const el = document.getElementById('wrong-list-content');
  if (entries.length === 0) {
    el.innerHTML = '<div class="empty-state">🎉 错题本是空的，你太棒了！</div>';
    return;
  }
  el.innerHTML = `<div class="card">
    <div class="card-title">共 ${entries.length} 个错题</div>
    ${entries.map(([h, v]) => `
      <div class="wrong-list-item">
        <span class="hanzi" style="cursor:pointer" onclick="speak('${h}',1)">${h} 🔊</span>
        <div class="info">
          <div class="py">${v.pinyin}</div>
          <div class="cnt">错误 ${v.count} 次</div>
        </div>
        <button class="del-btn" onclick="deleteWrong('${h}')">✕</button>
      </div>`).join('')}
  </div>`;
}
function deleteWrong(h) {
  const w = loadWrong();
  delete w[h];
  saveWrong(w);
  updateWrongBadge();
  renderWrongList();
}
function clearAllWrong() {
  if (!confirm('确定清空全部错题？')) return;
  localStorage.removeItem('hcl_wrong');
  updateWrongBadge();
  renderWrongList();
}

// ════════════════════════════════
// 学习统计
// ════════════════════════════════
function renderStats() {
  const s = loadStats();
  const acc = s.total > 0 ? Math.round(s.correct / s.total * 100) : 0;
  document.getElementById('stats-grid').innerHTML = `
    <div class="stat-card"><div class="stat-num">${s.sessions}</div><div class="stat-label">练习次数</div></div>
    <div class="stat-card"><div class="stat-num">${s.total}</div><div class="stat-label">总答题数</div></div>
    <div class="stat-card"><div class="stat-num">${s.correct}</div><div class="stat-label">答对数</div></div>
    <div class="stat-card"><div class="stat-num" style="color:${acc>=80?'var(--success)':acc>=60?'var(--warn)':'var(--danger)'}">${acc}%</div><div class="stat-label">正确率</div></div>
  `;
  const w = loadWrong();
  const top = Object.entries(w).sort((a,b) => b[1].count - a[1].count).slice(0,10);
  const topEl = document.getElementById('top-wrong-list');
  if (top.length === 0) {
    topEl.innerHTML = '<li class="word-item" style="justify-content:center;color:var(--sub)">暂无错题记录</li>';
  } else {
    topEl.innerHTML = top.map(([h,v]) =>
      `<li class="word-item wrong-item">
        <span class="hanzi" style="cursor:pointer" onclick="speak('${h}',1)">${h}</span>
        <span class="py">${v.pinyin}</span>
        <span class="py" style="color:var(--danger)">❌ ${v.count}次</span>
      </li>`
    ).join('');
  }
}

// ════════════════════════════════
// 打印版
// ════════════════════════════════
function setPrintGrade(g) {
  printGrade = g;
  document.querySelectorAll('#print-grade-btns .btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`#print-grade-btns .btn[onclick="setPrintGrade('${g}')"]`).classList.add('active');
  renderPrint();
}
function setPrintVer(v) {
  printVer = v;
  document.getElementById('pv1-btn').classList.toggle('active', v==='v1');
  document.getElementById('pv2-btn').classList.toggle('active', v==='v2');
  renderPrint();
}
function renderPrint() {
  const wrapper = document.getElementById('print-wrapper');
  wrapper.innerHTML = D[printGrade].map(ls => {
    const isV1 = printVer === 'v1';
    const hd = isV1
      ? `<tr><th style="width:40%">汉字词语</th><th style="width:60%">拼音</th></tr>`
      : `<tr><th style="width:30%">拼音提示</th><th style="width:35%">默写汉字</th><th style="width:35%">英文意思</th></tr>`;
    const rows = ls.w.map(w => isV1
      ? `<tr><td>${w[0]}</td><td>${w[1]}</td></tr>`
      : `<tr><td>${w[1]}</td><td></td><td></td></tr>`
    ).join('');
    return `<div class="print-lesson-page">
      <h2 class="lesson-title-print">${ls.t}</h2>
      <div class="student-info-print">
        <span>姓名：________________</span>
        <span>日期：______________</span>
        <span>得分：____ / ${ls.w.length}</span>
      </div>
      <table class="print-table"><thead>${hd}</thead><tbody>${rows}</tbody></table>
    </div>`;
  }).join('');
}

// ════════════════════════════════
// 初始化
// ════════════════════════════════
window.addEventListener('load', () => {
  buildLessonSelect();
  buildReviewLessonSelect();
  renderPrint();
  updateWrongBadge();
  // 预加载语音
  if (window.speechSynthesis) {
    window.speechSynthesis.getVoices();
    window.speechSynthesis.onvoiceschanged = () => {};
  }

  // 全局键盘快捷键
  document.addEventListener('keydown', (e) => {
    const area = document.getElementById('practice-area');
    if (!area || area.style.display === 'none') return;
    const inp = document.getElementById('answer-input');
    if (!inp || inp.disabled) return;
    if (e.key === ' ' || e.code === 'Space') {
      e.preventDefault();
      playWord();
    } else if (e.key === 'Escape') {
      e.preventDefault();
      skipWord();
    }
  });
});
</script>
